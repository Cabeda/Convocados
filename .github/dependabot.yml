version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/scheduler"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gradle"
    directory: "/android-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Hilt/Dagger can't read Kotlin 2.4.x metadata yet (shaded kotlin-metadata-jvm).
      # Remove this once Dagger ships 2.4.0 support.
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">=2.4.0"]
      - dependency-name: "org.jetbrains.kotlin.android"
        versions: [">=2.4.0"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.4.0"]
