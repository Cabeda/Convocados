name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

permissions:
  contents: read

jobs:
  performance:
    name: "${{ inputs.test_type }} test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable corepack and install pnpm
        run: corepack enable && corepack install
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build

      - name: Prepare database
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: file:./k6-test.db

      - name: Start server
        run: |
          node dist/server/entry.mjs &
          sleep 5
        env:
          HOST: 0.0.0.0
          PORT: 4321
          DATABASE_URL: file:./k6-test.db

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run ${{ inputs.test_type }} test
        uses: grafana/run-k6-action@v1
        with:
          path: k6/scripts/${{ inputs.test_type }}.js
        env:
          K6_BASE_URL: http://localhost:4321

      - name: Upload k6 results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: k6-${{ inputs.test_type }}-results
          path: k6-results/
          retention-days: 7
