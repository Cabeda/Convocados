      - name: Start server
        run: |
          node dist/server/entry.mjs &
          sleep 5
        env:
          HOST: 0.0.0.0
          PORT: 4321
          DATABASE_URL: file:./k6-test.db

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run load test
