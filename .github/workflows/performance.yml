          name: k6-load-results
          path: k6-results/
          retention-days: 30

  stress-test:
    name: Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress'

    steps:
      - uses: actions/checkout@v6
