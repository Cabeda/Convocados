name: Release

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    outputs:
      released: ${{ steps.bump_version.outputs.new_version != '' }}
      version: ${{ steps.bump_version.outputs.new_version }}

    steps:
      - name: Setup SSH for deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Get commits since last tag
        id: commits
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" ${LATEST_TAG}..HEAD)
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          echo "$COMMITS" > /tmp/commits.txt

      - name: Determine version bump type
        id: version_bump
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE:|^[a-z]+!:)"; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor|style|test|build|ci|chore|docs)(\(.*\))?:"; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "bump_type=none" >> $GITHUB_OUTPUT
          fi

      - name: Compute next version from tag
        id: bump_version
        if: steps.version_bump.outputs.bump_type != 'none'
        run: |
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          
          # Extract version from tag (remove 'v' prefix)
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (bump: $BUMP_TYPE from tag $LATEST_TAG)"

      - name: Update package.json version
        if: steps.version_bump.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$NEW_VERSION'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Updated package.json to version $NEW_VERSION"

      - name: Commit version bump
        if: steps.version_bump.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          git remote set-url origin git@github.com:${{ github.repository }}.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:main

      - name: Create tag
        if: steps.version_bump.outputs.bump_type != 'none'
        run: |
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push origin "v${{ steps.bump_version.outputs.new_version }}"

      - name: Generate changelog
        id: changelog
        if: steps.version_bump.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD~1..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${LATEST_TAG}..HEAD~1")
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...v${NEW_VERSION}"
          } > /tmp/changelog.md

      - name: Create GitHub Release
        if: steps.version_bump.outputs.bump_type != 'none'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const newVersion = '${{ steps.bump_version.outputs.new_version }}';
            const changelog = fs.readFileSync('/tmp/changelog.md', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${newVersion}`,
              name: `v${newVersion}`,
              body: changelog,
              draft: false,
              prerelease: false
            });

            console.log(`Release v${newVersion} created successfully`);

      - name: No release needed
        if: steps.version_bump.outputs.bump_type == 'none'
        run: echo "No conventional commits found since last release. Skipping."

  build-android:
    name: Build Android APK
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create placeholder google-services.json
        working-directory: android-app
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.cabeda.convocados" } }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Update app version
        working-directory: android-app
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

      - name: Build phone release APK
        working-directory: android-app
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Sign phone APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: android-app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK found"; exit 1; fi
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER sign \
              --ks /tmp/release.keystore \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$APK"
          else
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore /tmp/release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" "${{ secrets.KEY_ALIAS }}"
          fi
          rm -f /tmp/release.keystore

      - name: Upload phone APK to GitHub Release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = '${{ needs.release.outputs.version }}';
            const tag = `v${version}`;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            const apkDir = 'android-app/app/build/outputs/apk/release';
            const files = fs.readdirSync(apkDir);
            const apk = files.find(f => f.endsWith('.apk'));
            if (!apk) throw new Error('No APK found in ' + apkDir);

            const apkPath = path.join(apkDir, apk);
            const apkName = `convocados-${version}.apk`;

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: apkName,
              data: fs.readFileSync(apkPath)
            });

            console.log(`Uploaded ${apkName} to release ${tag}`);

  build-wear:
    name: Build Wear OS APK
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update wear version
        working-directory: android-app
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" wear/build.gradle.kts

      - name: Build Wear OS release APK
        working-directory: android-app
        run: ./gradlew :wear:assembleRelease --no-daemon

      - name: Sign Wear OS APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: android-app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > /tmp/release.keystore
          APK=$(find wear/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No Wear APK found"; exit 1; fi
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER sign \
              --ks /tmp/release.keystore \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$APK"
          else
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore /tmp/release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" "${{ secrets.KEY_ALIAS }}"
          fi
          rm -f /tmp/release.keystore

      - name: Upload Wear OS APK to GitHub Release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = '${{ needs.release.outputs.version }}';
            const tag = `v${version}`;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            const apkDir = 'android-app/wear/build/outputs/apk/release';
            const files = fs.readdirSync(apkDir);
            const apk = files.find(f => f.endsWith('.apk'));
            if (!apk) throw new Error('No Wear APK found in ' + apkDir);

            const apkPath = path.join(apkDir, apk);
            const apkName = `convocados-wear-${version}.apk`;

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: apkName,
              data: fs.readFileSync(apkPath)
            });

            console.log(`Uploaded ${apkName} to release ${tag}`);

  deploy:
    name: Deploy
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: docker/setup-buildx-action@v3

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate to Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.fly.io/convocados:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Fly.io
        run: flyctl deploy --image registry.fly.io/convocados:${{ needs.release.outputs.version }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
