name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new push lands.
# Saves CI minutes when a developer pushes repeatedly to the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Static analysis: typecheck, lint (parallel) ──────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ── Seed smoke: catches dev-script breakage fast ────────────────────────
  # Runs against a throwaway DB so the seed script can't pass by reusing
  # stale state. pnpm + tsx resolution has bitten us before — keep this
  # under 3 min so it stays cheap on the free tier.
  seed-smoke:
    name: DB Seed Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prepare throwaway DB
        env:
          DATABASE_URL: file:./seed-smoke.db
          BETTER_AUTH_URL: http://localhost:4321
        run: pnpm prisma migrate deploy
      - name: Run seed
        env:
          DATABASE_URL: file:./seed-smoke.db
          BETTER_AUTH_URL: http://localhost:4321
        run: pnpm db:seed

  # ── Unit + integration tests ────────────────────────────────────────────
  # Coverage is only run on push to main — on PRs we skip coverage to halve
  # the test runtime (~205s → ~80s on this codebase).
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - name: Run tests (no coverage on PRs)
        if: github.event_name == 'pull_request'
        run: pnpm vitest run --reporter=default --reporter=json --outputFile=test-results.json
      - name: Run tests with coverage
        if: github.event_name != 'pull_request'
        run: pnpm vitest run --coverage --reporter=default --reporter=json --outputFile=test-results.json
        env:
          COVERAGE_THRESHOLDS: "1"
      - name: Report flaky tests
        if: always()
        run: node scripts/report-flaky.mjs
      - name: Check coverage thresholds
        if: github.event_name != 'pull_request'
        run: node -e "const c=require('./coverage/coverage-summary.json');const t={lines:95,functions:89,branches:83,statements:92};for(const k in t)if(c.total[k].pct<t[k])throw new Error(k+' coverage '+c.total[k].pct+'% < '+t[k]+'%')"

  # ── Build (needed for E2E) ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 1

  # ── Lighthouse — only on push to main, not on PRs ────────────────────────
  # Was 30% of CI time on PRs. Now main-only.
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist/
      - name: Prepare database for Lighthouse
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: file:./ci-test.db
      - name: Run Lighthouse CI
        run: pnpm lhci

  # ── E2E tests ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist/
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-${{ runner.os }}-chromium
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install chromium
      - name: Install Playwright system deps
        run: pnpm playwright install-deps chromium
      - name: Run E2E tests
        run: pnpm playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  check-android:
    name: Check Android Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            android:
              - 'android-app/**'

  android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: check-android
    if: needs.check-android.outputs.android == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create placeholder google-services.json
        working-directory: android-app
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.cabeda.Convocados" } }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Build phone debug APK
        working-directory: android-app
        run: ./gradlew :app:assembleDebug --no-daemon

  android-wear:
    name: Wear OS Build
    runs-on: ubuntu-latest
    needs: check-android
    if: needs.check-android.outputs.android == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Wear OS debug APK
        working-directory: android-app
        run: ./gradlew :wear:assembleDebug --no-daemon



  # ── Gate job: single required status check for branch protection ─────────
  # Branch protection requires a check named "CI". This job depends on all
  # the real jobs and reports a single pass/fail status.
  ci-gate:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [typecheck, lint, test, build, e2e, seed-smoke]
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed"
