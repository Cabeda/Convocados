name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable corepack and install pnpm
        run: corepack enable && corepack install
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Security audit
        # CVE-2025-48065: Vitest UI server file read — dev-only tool, not exposed in CI/prod.
        # Blocked by vitest 4.x migration (breaking config changes). Track in a follow-up.
        run: pnpm audit --audit-level=high --ignore CVE-2025-48065
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Type check
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Run tests with coverage
        run: pnpm vitest run --coverage
      - name: Build
        run: pnpm build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 1
      - name: Prepare database for Lighthouse
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: file:./ci-test.db
      - name: Run Lighthouse CI
        run: pnpm lhci

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable corepack and install pnpm
        run: corepack enable && corepack install
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist/
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm playwright --version)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install chromium
      - name: Install Playwright system deps
        run: pnpm playwright install-deps chromium
      - name: Run E2E tests
        run: pnpm playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  check-android:
    name: Check Android Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            android:
              - 'android-app/**'

  android:
    name: Android Build
    runs-on: ubuntu-latest
    needs: check-android
    if: needs.check-android.outputs.android == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create placeholder google-services.json
        working-directory: android-app
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.cabeda.Convocados" } }, "api_key": [{ "current_key": "placeholder" }] }],
            "configuration_version": "1"
          }
          EOF

      - name: Build phone debug APK
        working-directory: android-app
        run: ./gradlew :app:assembleDebug --no-daemon

  android-wear:
    name: Wear OS Build
    runs-on: ubuntu-latest
    needs: check-android
    if: needs.check-android.outputs.android == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Wear OS debug APK
        working-directory: android-app
        run: ./gradlew :wear:assembleDebug --no-daemon
