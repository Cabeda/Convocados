app = "convocados"
primary_region = "cdg"

[build]

[deploy]
  # Runs once per deploy, before the new app version takes traffic. If the
  # migration fails, the deploy fails and the previous version keeps serving.
  # This is the canonical place for schema changes — see docs/runbooks/.
  # The release-migrate.sh wrapper also auto-resolves failed migrations
  # left from prior deploys so the app isn't stuck crash-looping on P3009.
  release_command = "sh scripts/release-migrate.sh"

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  NODE_ENV = "production"
  BETTER_AUTH_URL = "https://convocados.cabeda.dev"
  EMAIL_FROM = "Convocados <noreply@cabeda.dev>"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 15
    soft_limit = 10

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "football_data"
  destination = "/data"
  initial_size = "1gb"
