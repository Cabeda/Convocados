appId: host.exp.Exponent
---
# Happy path: Quick join and leave a game
- tapOn: "Test Game"
- waitForAnimationToEnd
- assertVisible: "Test Game"

# Already joined — leave first
- tapOn: "Leave"
- waitForAnimationToEnd
- assertVisible: "Join"

# Quick join
- tapOn: "Join"
- waitForAnimationToEnd
- assertVisible: "You joined as"

# Leave again to restore state
- tapOn: "Leave"
- waitForAnimationToEnd
- assertVisible: "Join"

# Go back
- back
