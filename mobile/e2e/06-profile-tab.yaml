appId: host.exp.Exponent
---
# Happy path: Profile tab shows user info and settings
- tapOn: "Profile"
- waitForAnimationToEnd
- assertVisible: "Sign out"
- assertVisible: "Language"
- assertVisible: "Notifications"
- assertVisible: "Server URL"

# Open language picker
- tapOn: "Language"
- waitForAnimationToEnd
- assertVisible: "English"
- assertVisible: "Português"

# Close by tapping Language again
- tapOn: "Language"
